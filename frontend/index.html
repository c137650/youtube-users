<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Memory Graph - 个人记忆图谱</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>🎬 YouTube Memory Graph</h1>
            <p class="subtitle">你的观看历史可视化</p>
            <button id="loadDataBtn" class="btn-primary">📂 加载数据</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </header>

        <!-- Bubble View -->
        <div id="bubbleView" class="view">
            <div class="bubble-layout">
                <!-- 左：建议栏 -->
                <div id="suggestPanel" class="suggest-panel">
                    <div class="suggest-panel-header">
                        <span class="suggest-panel-icon">🌍</span>
                        <span class="suggest-panel-title">拓宽视野</span>
                    </div>
                    <p class="suggest-subtitle">逃离信息茧房的方向与视频</p>
                    <div id="suggestResult" class="suggest-result">
                        <p class="ai-placeholder">加载数据后自动生成推荐…</p>
                    </div>
                </div>

                <!-- 中：气泡图 -->
                <div class="canvas-container">
                    <canvas id="bubbleCanvas"></canvas>
                </div>

                <!-- 右：AI 分析栏 -->
                <div id="aiPanel" class="ai-panel">
                    <div class="ai-key-section">
                        <label class="ai-key-label">MiniMax API Key</label>
                        <div class="ai-key-row">
                            <input type="password" id="apiKeyInput" class="ai-key-input" placeholder="输入你的 API Key" autocomplete="off" />
                            <button id="saveKeyBtn" class="ai-key-btn">保存</button>
                        </div>
                        <div id="keyStatus" class="key-status"></div>
                    </div>
                    <div class="ai-divider"></div>
                    <div class="ai-content">
                        <div class="ai-panel-header">
                            <span class="ai-panel-icon">🧠</span>
                            <span class="ai-panel-title">你的兴趣画像</span>
                        </div>
                        <div id="aiResult" class="ai-result">
                            <p class="ai-placeholder">加载数据后自动生成分析…</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Knowledge Graph View -->
        <div id="graphView" class="view hidden">
            <div class="canvas-container">
                <canvas id="graphCanvas"></canvas>
            </div>
            <button id="backBtn" class="btn-back">← 返回气泡图</button>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="tooltip hidden">
            <h3 class="tooltip-title"></h3>
            <p class="tooltip-channel"></p>
            <p class="tooltip-time"></p>
            <p class="tooltip-hint"></p>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
    </div>

    <!-- D3.js + Force -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
