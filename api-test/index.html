<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MiniMax API 测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 640px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h2 { font-size: 1.2rem; color: #a0a0c0; }
        label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 6px; }
        input, textarea, select {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #667eea; }
        textarea { resize: vertical; height: 80px; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #result {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 16px;
            font-size: 0.88rem;
            line-height: 1.7;
            color: #c0c0d0;
            white-space: pre-wrap;
            min-height: 120px;
            word-break: break-word;
        }
        #status {
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }
        .ok  { background: #052e16; color: #6ee7b7; }
        .err { background: #2d0a0a; color: #fca5a5; }
        .ing { background: #1e1b4b; color: #a5b4fc; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔬 MiniMax API 调试</h2>

    <div>
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="输入你的 MiniMax API Key" />
    </div>

    <div>
        <label>Base URL</label>
        <input type="text" id="baseUrl" value="https://api.minimaxi.com/v1" />
    </div>

    <div>
        <label>Model</label>
        <input type="text" id="model" value="MiniMax-Text-01" />
    </div>

    <div>
        <label>测试消息</label>
        <textarea id="message">你好，请用一句话介绍你自己。</textarea>
    </div>

    <button id="sendBtn" onclick="runTest()">▶ 发送请求</button>

    <div id="statusBar"></div>
    <div id="result">等待测试…</div>
</div>

<script>
function setStatus(text, type) {
    const el = document.getElementById('statusBar');
    el.innerHTML = `<span class="${type}" id="status">${text}</span>`;
}

async function runTest() {
    const apiKey  = document.getElementById('apiKey').value.trim();
    const baseUrl = document.getElementById('baseUrl').value.trim();
    const model   = document.getElementById('model').value.trim();
    const message = document.getElementById('message').value.trim();
    const result  = document.getElementById('result');
    const btn     = document.getElementById('sendBtn');

    if (!apiKey) { setStatus('❌ 请先填写 API Key', 'err'); return; }

    btn.disabled = true;
    result.textContent = '';
    setStatus('⏳ 请求中…', 'ing');

    const url = `${baseUrl}/text/chatcompletion_v2`;

    try {
        const resp = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
                model,
                messages: [{ role: 'user', content: message }],
                stream: true,
            }),
        });

        setStatus(`HTTP ${resp.status} ${resp.statusText}`, resp.ok ? 'ing' : 'err');

        if (!resp.ok) {
            const errText = await resp.text();
            result.textContent = `[响应头]\n${[...resp.headers].map(([k,v])=>`${k}: ${v}`).join('\n')}\n\n[响应体]\n${errText}`;
            setStatus(`❌ HTTP ${resp.status}`, 'err');
            return;
        }

        // 打印关键响应头
        const headers = ['content-type', 'transfer-encoding', 'x-request-id'];
        let headerInfo = headers.map(h => `${h}: ${resp.headers.get(h) || '(无)'}`).join('\n');
        result.textContent += `[响应头]\n${headerInfo}\n\n`;

        // 先尝试直接读取全部文本
        const rawText = await resp.text();
        result.textContent += `[原始响应长度] ${rawText.length} 字节\n`;
        result.textContent += `[原始响应前 800 字符]\n${rawText.slice(0, 800)}\n`;

        // 解析 SSE 行
        let chunkCount = 0;
        let hasContent = false;
        let hasReasoning = false;

        for (const line of rawText.split('\n')) {
            const raw = line.trim();
            if (!raw.startsWith('data:')) continue;
            const jsonStr = raw.slice(5).trim();
            if (jsonStr === '[DONE]') continue;
            try {
                const chunk = JSON.parse(jsonStr);
                chunkCount++;
                const delta = chunk.choices?.[0]?.delta || {};
                const keys = Object.keys(delta);
                if (chunkCount <= 5) {
                    result.textContent += `\n[chunk ${chunkCount}] delta: ${JSON.stringify(delta).slice(0, 300)}`;
                }
                if (delta.content) hasContent = true;
                if (delta.reasoning_content) hasReasoning = true;
            } catch {}
        }

        const summary = [
            `共 ${chunkCount} chunk`,
            hasContent   ? '✅ content'           : '❌ 无content',
            hasReasoning ? '🧠 reasoning_content' : '',
        ].filter(Boolean).join(' | ');
        setStatus(summary, hasContent || hasReasoning ? 'ok' : 'err');

    } catch (e) {
        result.textContent = `[JS 错误]\n${e.message}\n\n${e.stack || ''}`;
        setStatus(`❌ 网络/CORS 错误`, 'err');
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
